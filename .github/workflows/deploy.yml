name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.74.0"

      - name: Build deposit app
        run: cd deposit && npm ci && npm run build

      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.74.0"
          workingDirectory: deposit

      - name: Smoke test — verify site returns 200
        run: |
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://swypt.app/)
          if [ "$STATUS" != "200" ]; then
            echo "::error::swypt.app returned $STATUS instead of 200 after deploy"
            exit 1
          fi
          echo "swypt.app is live (HTTP $STATUS)"

      - name: Purge swypt.app cache
        continue-on-error: true
        env:
          ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$ZONE_ID" ]; then
            echo "::warning::CLOUDFLARE_ZONE_ID secret not set — skipping cache purge"
            exit 0
          fi
          RESULT=$(curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CF_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"purge_everything":true}')
          if echo "$RESULT" | grep -q '"success":true'; then
            echo "Cache purged successfully"
          else
            echo "::warning::Cache purge response: $RESULT"
          fi
